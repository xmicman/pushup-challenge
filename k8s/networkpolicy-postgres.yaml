apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-allow-ingress
  namespace: mia-system
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: n8n
        - podSelector:
            matchLabels:
              app: postgres-backup
        - podSelector:
            matchLabels:
              app: uptime-kuma
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: pushup
          podSelector:
            matchLabels:
              app: pushup-app
      ports:
        - port: 5432
          protocol: TCP
