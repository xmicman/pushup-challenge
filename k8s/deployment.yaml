apiVersion: apps/v1
kind: Deployment
metadata:
  name: pushup-app
  namespace: pushup
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pushup-app
  template:
    metadata:
      labels:
        app: pushup-app
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/xmicman/pushup-challenge:latest
          command: ["node", "node_modules/prisma/build/index.js", "migrate", "deploy"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pushup-secret
                  key: DATABASE_URL
      containers:
        - name: pushup-app
          image: ghcr.io/xmicman/pushup-challenge:latest
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pushup-secret
                  key: DATABASE_URL
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: pushup-secret
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pushup-secret
                  key: GOOGLE_CLIENT_SECRET
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: pushup-secret
                  key: NEXTAUTH_SECRET
            - name: CRON_SECRET
              valueFrom:
                secretKeyRef:
                  name: pushup-secret
                  key: CRON_SECRET
            - name: NEXTAUTH_URL
              value: "https://pushups.micman.cz"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/leaderboard
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: pushup-app
  namespace: pushup
spec:
  selector:
    app: pushup-app
  ports:
    - port: 3000
      targetPort: 3000
