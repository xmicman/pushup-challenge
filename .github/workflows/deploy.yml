name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/xmicman/pushup-challenge

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply namespace & ingress
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Create/update secret
        run: |
          kubectl create secret generic pushup-secret -n pushup \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            --from-literal=GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --from-literal=NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
            --from-literal=CRON_SECRET="${{ secrets.CRON_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply deployment & cronjob
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/cronjob.yaml

      - name: Force rollout with new image
        run: |
          kubectl set image deployment/pushup-app \
            pushup-app=${{ env.IMAGE }}:latest \
            -n pushup
          kubectl rollout status deployment/pushup-app -n pushup --timeout=120s

      - name: Run DB migrations
        run: |
          kubectl exec -n pushup deployment/pushup-app -- \
            npx prisma migrate deploy
